name: Deploy Codeberg Pages

on:
  push:
    branches:
      - main
    paths:
      - 'web/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: codeberg-tiny
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy to pages branch
        run: |
          git config user.name "nichu42"
          git config user.email "nroediger@nic-site.de"
          
          # Set up authentication remote URL using Forgejo's native forge.token
          git remote set-url origin "https://x-access-token:${{ forge.token }}@codeberg.org/${{ forge.repository }}.git"
          
          # Copy the web folder to a temporary location outside the repo
          cp -r web ../temp_web
          
          # Switch to pages branch and pull latest changes
          git checkout pages
          git pull origin pages
          
          # Remove all existing tracked files on the pages branch
          git rm -rf .
          
          # Copy new files from temporary directory to the root (including dotfiles)
          cp -a ../temp_web/. .
          rm -rf ../temp_web
          
          # Stage all changes (new, modified, deleted files)
          git add -A
          
          # Commit and push
          git commit -m "Deploy updated web assets to Codeberg Pages [CI]" || echo "No changes to commit"
          git push origin pages
