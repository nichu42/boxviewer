steps:
  - name: dev-build
    image: runmymind/docker-android-sdk:latest
    environment:
      KEYSTORE_B64:
        from_secret: keystore_b64
      STORE_PASSWORD:
        from_secret: store_password
      KEY_PASSWORD:
        from_secret: key_password
    commands:
      - echo "$KEYSTORE_B64" | base64 -d > my-upload-key.jks
      - chmod +x gradlew
      - ./gradlew assembleDebug
    when:
      - event: push
        branch: main

  - name: dev-release
    image: alpine:latest
    environment:
      CODEBERG_TOKEN:
        from_secret: codeberg_token
    commands:
      - apk add --no-cache curl jq
      - TAG="dev"
      - OWNER="nichu42"
      - REPO="BoxViewer"
      - API="https://codeberg.org/api/v1/repos/$OWNER/$REPO"
      - |
        # Delete existing dev release + tag if present
        curl -s -X DELETE -H "Authorization: token $CODEBERG_TOKEN" \
          "$API/releases/tags/$TAG" || true
        # Create new release
        curl -s -X POST -H "Authorization: token $CODEBERG_TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"tag_name\":\"$TAG\",\"name\":\"Dev Build\",\"body\":\"Latest automatic dev build.\",\"prerelease\":true,\"draft\":false}" \
          "$API/releases" | jq -r '.id' > /tmp/release_id
        # Upload APK
        RELEASE_ID=$(cat /tmp/release_id)
        curl -s -X POST -H "Authorization: token $CODEBERG_TOKEN" \
          -H "Content-Type: application/octet-stream" \
          --data-binary @app/build/outputs/apk/debug/app-debug.apk \
          "$API/releases/$RELEASE_ID/assets?name=BoxViewer-dev.apk"
    when:
      - event: push
        branch: main

  - name: release-build
    image: runmymind/docker-android-sdk:latest
    environment:
      KEYSTORE_B64:
        from_secret: keystore_b64
      STORE_PASSWORD:
        from_secret: store_password
      KEY_PASSWORD:
        from_secret: key_password
    commands:
      - echo "$KEYSTORE_B64" | base64 -d > my-upload-key.jks
      - chmod +x gradlew
      - ./gradlew assembleRelease
    when:
      - event: tag

  - name: release-upload
    image: alpine:latest
    environment:
      CODEBERG_TOKEN:
        from_secret: codeberg_token
    commands:
      - apk add --no-cache curl jq
      - OWNER="nichu42"
      - REPO="BoxViewer"
      - TAG="${CI_COMMIT_TAG}"
      - API="https://codeberg.org/api/v1/repos/$OWNER/$REPO"
      - |
        # Create release
        curl -s -X POST -H "Authorization: token $CODEBERG_TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"tag_name\":\"$TAG\",\"name\":\"$TAG\",\"body\":\"BoxViewer $TAG\",\"prerelease\":false,\"draft\":false}" \
          "$API/releases" | jq -r '.id' > /tmp/release_id
        # Upload APK
        RELEASE_ID=$(cat /tmp/release_id)
        curl -s -X POST -H "Authorization: token $CODEBERG_TOKEN" \
          -H "Content-Type: application/octet-stream" \
          --data-binary @app/build/outputs/apk/release/app-release.apk \
          "$API/releases/$RELEASE_ID/assets?name=BoxViewer-$TAG.apk"
    when:
      - event: tag
