steps:
  - name: dev-build
    image: runmymind/docker-android-sdk:latest
    environment:
      KEYSTORE_B64:
        from_secret: keystore_b64
      STORE_PASSWORD:
        from_secret: store_password
      KEY_PASSWORD:
        from_secret: key_password
    commands:
      - echo "$KEYSTORE_B64" | base64 -d > my-upload-key.jks
      - chmod +x gradlew
      - ./gradlew assembleDebug
    when:
      - event: push
        branch: main
        path:
          include:
            - 'app/**'
            - 'gradle/**'
            - '*.gradle.kts'
            - '*.toml'
            - '*.properties'
            - '.woodpecker/**'
          exclude:
            - 'README.md'
            - 'LICENSE'
            - '.gitignore'
            - 'metadata.json'
            - '.env.example'
            - 'AGENTS.md'

  - name: dev-release
    image: alpine:latest
    environment:
      CODEBERG_TOKEN:
        from_secret: codeberg_token
    commands:
      - apk add --no-cache curl
      - TAG="dev"
      - OWNER="nichu42"
      - REPO="BoxViewer"
      - API="https://codeberg.org/api/v1/repos/$OWNER/$REPO"
      - |
        # Check if release already exists
        RESP=$(curl -s -o /dev/null -w "%{http_code}" \
          -H "Authorization: token $CODEBERG_TOKEN" \
          "$API/releases/tags/$TAG")
        if [ "$RESP" = "200" ]; then
          # Delete old dev release
          curl -s -X DELETE \
            -H "Authorization: token $CODEBERG_TOKEN" \
            "$API/releases/tags/$TAG" || true
        fi
        # Create fresh release and capture the top-level id
        RESP=$(curl -s -X POST \
          -H "Authorization: token $CODEBERG_TOKEN" \
          -H "Content-Type: application/json" \
          -d '{"tag_name":"dev","name":"🔧 Dev Build","body":"Automatic build of the latest commit. Updated on every push to `main`.","prerelease":true,"draft":false}' \
          "$API/releases")
        RELEASE_ID=$(echo "$RESP" | grep -o '"id":[0-9]*' | head -1 | cut -d: -f2)
        # Upload APK
        curl -s -X POST \
          -H "Authorization: token $CODEBERG_TOKEN" \
          -H "Content-Type: application/octet-stream" \
          --data-binary @app/build/outputs/apk/debug/app-debug.apk \
          "$API/releases/$RELEASE_ID/assets?name=BoxViewer-dev.apk" > /dev/null
    when:
      - event: push
        branch: main
        path:
          include:
            - 'app/**'
            - 'gradle/**'
            - '*.gradle.kts'
            - '*.toml'
            - '*.properties'
            - '.woodpecker/**'
          exclude:
            - 'README.md'
            - 'LICENSE'
            - '.gitignore'
            - 'metadata.json'
            - '.env.example'
            - 'AGENTS.md'

  - name: release-build
    image: runmymind/docker-android-sdk:latest
    environment:
      KEYSTORE_B64:
        from_secret: keystore_b64
      STORE_PASSWORD:
        from_secret: store_password
      KEY_PASSWORD:
        from_secret: key_password
    commands:
      - echo "$KEYSTORE_B64" | base64 -d > my-upload-key.jks
      - chmod +x gradlew
      - ./gradlew assembleRelease
    when:
      - event: tag

  - name: release-upload
    image: alpine:latest
    environment:
      CODEBERG_TOKEN:
        from_secret: codeberg_token
    commands:
      - apk add --no-cache curl
      - OWNER="nichu42"
      - REPO="BoxViewer"
      - TAG="${CI_COMMIT_TAG}"
      - API="https://codeberg.org/api/v1/repos/$OWNER/$REPO"
      - |
        # Create release for this tag
        RESP=$(curl -s -X POST \
          -H "Authorization: token $CODEBERG_TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"tag_name\":\"$TAG\",\"name\":\"$TAG\",\"body\":\"BoxViewer $TAG\",\"prerelease\":false,\"draft\":false}" \
          "$API/releases")
        RELEASE_ID=$(echo "$RESP" | grep -o '"id":[0-9]*' | head -1 | cut -d: -f2)
        # Upload APK
        curl -s -X POST \
          -H "Authorization: token $CODEBERG_TOKEN" \
          -H "Content-Type: application/octet-stream" \
          --data-binary @app/build/outputs/apk/release/app-release.apk \
          "$API/releases/$RELEASE_ID/assets?name=BoxViewer-$TAG.apk" > /dev/null
    when:
      - event: tag
