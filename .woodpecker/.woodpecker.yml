steps:
  - name: dev-build
    image: runmymind/docker-android-sdk:latest
    environment:
      KEYSTORE_B64:
        from_secret: keystore_b64
      STORE_PASSWORD:
        from_secret: store_password
      KEY_PASSWORD:
        from_secret: key_password
    commands:
      - echo "$KEYSTORE_B64" | base64 -d > my-upload-key.jks
      - chmod +x gradlew
      - ./gradlew assembleDebug -PdevVersionCode=$(git rev-list --count HEAD) -PdevSha=$(git rev-parse --short HEAD)
    when:
      - event: push
        branch: main
        path:
          include:
            - 'app/**'
            - 'gradle/**'
            - '*.gradle.kts'
            - '*.toml'
            - '*.properties'
            - '.woodpecker/**'
          exclude:
            - 'README.md'
            - 'LICENSE'
            - '.gitignore'
            - 'metadata.json'
            - '.env.example'
            - 'AGENTS.md'

  - name: dev-release
    image: alpine:latest
    environment:
      CODEBERG_TOKEN:
        from_secret: codeberg_token
    commands:
      - apk add --no-cache curl jq
      - TAG="dev"
      - OWNER="nichu42"
      - REPO="BoxViewer"
      - API="https://codeberg.org/api/v1/repos/$OWNER/$REPO"
      - |
        # Get or create the dev release
        RESP=$(curl -s -H "Authorization: token $CODEBERG_TOKEN" \
          "$API/releases/tags/$TAG")
        RELEASE_ID=$(echo "$RESP" | jq -r '.id // empty')
        if [ -z "$RELEASE_ID" ]; then
          echo "Creating new release"
          RESP=$(curl -s -X POST \
            -H "Authorization: token $CODEBERG_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"tag_name":"dev","name":"🔧 Dev Build","body":"Automatic build of the latest commit. Updated on every push to `main`.","prerelease":true,"draft":false}' \
            "$API/releases")
          RELEASE_ID=$(echo "$RESP" | jq -r '.id // empty')
          if [ -z "$RELEASE_ID" ]; then
            echo "ERROR: Failed to create release: $RESP"
            exit 1
          fi
        else
          echo "Using existing release ID=$RELEASE_ID"
        fi
        # Delete any existing assets before uploading
        for asset_id in $(curl -s -H "Authorization: token $CODEBERG_TOKEN" \
          "$API/releases/$RELEASE_ID/assets" | jq -r '.[].id'); do
          echo "Deleting existing asset ID=$asset_id"
          curl -s -X DELETE \
            -H "Authorization: token $CODEBERG_TOKEN" \
            "$API/releases/assets/$asset_id"
        done
        # Upload APK
        echo "Uploading APK..."
        curl -s -X POST \
          -H "Authorization: token $CODEBERG_TOKEN" \
          -H "Content-Type: application/octet-stream" \
          --data-binary @app/build/outputs/apk/debug/app-debug.apk \
          "$API/releases/$RELEASE_ID/assets?name=BoxViewer-dev.apk" -w "\nHTTP %{http_code}\n"
    when:
      - event: push
        branch: main
        path:
          include:
            - 'app/**'
            - 'gradle/**'
            - '*.gradle.kts'
            - '*.toml'
            - '*.properties'
            - '.woodpecker/**'
          exclude:
            - 'README.md'
            - 'LICENSE'
            - '.gitignore'
            - 'metadata.json'
            - '.env.example'
            - 'AGENTS.md'

  - name: release-build
    image: runmymind/docker-android-sdk:latest
    environment:
      KEYSTORE_B64:
        from_secret: keystore_b64
      STORE_PASSWORD:
        from_secret: store_password
      KEY_PASSWORD:
        from_secret: key_password
    commands:
      - echo "$KEYSTORE_B64" | base64 -d > my-upload-key.jks
      - chmod +x gradlew
      - ./gradlew assembleRelease
    when:
      - event: tag
        branch: v*

  - name: release-upload
    image: alpine:latest
    environment:
      CODEBERG_TOKEN:
        from_secret: codeberg_token
    commands:
      - apk add --no-cache curl
      - OWNER="nichu42"
      - REPO="BoxViewer"
      - TAG="${CI_COMMIT_TAG}"
      - API="https://codeberg.org/api/v1/repos/$OWNER/$REPO"
      - |
        # Check if release already exists for this tag (Codeberg auto-creates one)
        RESP=$(curl -s -H "Authorization: token $CODEBERG_TOKEN" \
          "$API/releases/tags/$TAG")
        HTTP_CODE=$(echo "$RESP" | grep -o '"id":[0-9]*' | head -1 | cut -d: -f2)
        if [ -n "$HTTP_CODE" ] && [ "$HTTP_CODE" != "null" ]; then
          RELEASE_ID=$HTTP_CODE
          echo "Release already exists, using ID=$RELEASE_ID"
        else
          echo "Creating new release for tag $TAG"
          RESP=$(curl -s -X POST \
            -H "Authorization: token $CODEBERG_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"$TAG\",\"name\":\"$TAG\",\"body\":\"BoxViewer $TAG\",\"prerelease\":false,\"draft\":false}" \
            "$API/releases")
          RELEASE_ID=$(echo "$RESP" | grep -o '"id":[0-9]*' | head -1 | cut -d: -f2)
          if [ -z "$RELEASE_ID" ]; then
            echo "ERROR: Failed to create release"
            echo "$RESP"
            exit 1
          fi
          echo "Created release ID=$RELEASE_ID"
        fi
        # Delete any existing assets with the same name before uploading
        ASSETS_JSON=$(curl -s \
          -H "Authorization: token $CODEBERG_TOKEN" \
          "$API/releases/$RELEASE_ID/assets")
        echo "$ASSETS_JSON" | grep -o '"id":[0-9]*' | cut -d: -f2 | while read asset_id; do
          echo "Deleting existing asset ID=$asset_id"
          curl -s -X DELETE \
            -H "Authorization: token $CODEBERG_TOKEN" \
            "$API/releases/assets/$asset_id" || true
        done
        # Upload APK
        APK="app/build/outputs/apk/release/app-release.apk"
        if [ ! -f "$APK" ]; then
          echo "ERROR: APK not found at $APK"
          exit 1
        fi
        echo "Uploading $APK as BoxViewer-$TAG.apk"
        curl -s -X POST \
          -H "Authorization: token $CODEBERG_TOKEN" \
          -H "Content-Type: application/octet-stream" \
          --data-binary @"$APK" \
          "$API/releases/$RELEASE_ID/assets?name=BoxViewer-$TAG.apk" -w "\nHTTP %{http_code}\n"
    when:
      - event: tag
        branch: v*
