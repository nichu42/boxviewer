steps:
  - name: dev-build
    image: runmymind/docker-android-sdk:latest
    environment:
      KEYSTORE_B64:
        from_secret: keystore_b64
      STORE_PASSWORD:
        from_secret: store_password
      KEY_PASSWORD:
        from_secret: key_password
    commands:
      - echo "$KEYSTORE_B64" | base64 -d > my-upload-key.jks
      - ./gradlew assembleDebug
    when:
      - event: push
        branch: main

  - name: dev-release
    image: codeberg.org/woodpecker-plugins/forgejo-release:latest
    settings:
      base_url: https://codeberg.org
      files:
        - app/build/outputs/apk/debug/app-debug.apk
      api_key:
        from_secret: codeberg_token
      tag: dev
      overwrite: true
    when:
      - event: push
        branch: main

  - name: release-build
    image: runmymind/docker-android-sdk:latest
    environment:
      KEYSTORE_B64:
        from_secret: keystore_b64
      STORE_PASSWORD:
        from_secret: store_password
      KEY_PASSWORD:
        from_secret: key_password
    commands:
      - echo "$KEYSTORE_B64" | base64 -d > my-upload-key.jks
      - ./gradlew assembleRelease
    when:
      - event: tag

  - name: release-upload
    image: codeberg.org/woodpecker-plugins/forgejo-release:latest
    settings:
      base_url: https://codeberg.org
      files:
        - app/build/outputs/apk/release/app-release.apk
      api_key:
        from_secret: codeberg_token
    when:
      - event: tag
