<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoxViewer | senseBox Sharing</title>

    <!-- Open Graph Metadata for Social Previews -->
    <meta property="og:title" content="BoxViewer - senseBox Sharing">
    <meta property="og:description" content="View live sensor data from this senseBox in the BoxViewer app.">
    <meta property="og:image" content="https://nichu42.codeberg.page/BoxViewer/logo.webp">
    <meta property="og:type" content="website">

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f5f7;
            color: #1d1d1f;
            text-align: center;
        }
        .container {
            max-width: 400px;
            padding: 2.5rem;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .logo {
            width: 80px;
            height: 80px;
            margin-bottom: 1.5rem;
            border-radius: 18px;
        }
        h1 { font-size: 24px; margin-bottom: 1rem; }
        p { color: #86868b; line-height: 1.5; margin-bottom: 2rem; }
        .btn {
            display: inline-block;
            background-color: #0071e3;
            color: white;
            padding: 12px 24px;
            border-radius: 980px;
            text-decoration: none;
            font-weight: 600;
            transition: background-color 0.2s;
        }
        .btn:hover { background-color: #0077ed; }
        .footer { margin-top: 2rem; font-size: 12px; color: #86868b; }
        .footer a { color: #0071e3; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.webp" alt="BoxViewer Logo" class="logo">
        <h1>Opening senseBox...</h1>
        <p>We're attempting to open this station in the BoxViewer app.</p>

        <a href="https://codeberg.org/nichu42/BoxViewer" class="btn">Get BoxViewer on Codeberg</a>

        <div class="footer">
            <p>Compatible with de-googled Android devices.<br>
            Privacy-first. Open Source.</p>
        </div>
    </div>

    <script>
        (function() {
            const params = new URLSearchParams(window.location.search);
            const boxId = params.get('id');

            if (boxId) {
                const deepLink = `boxviewer://box/${boxId}`;

                // Try to redirect immediately
                window.location.href = deepLink;

                // Fallback for browsers that don't redirect automatically
                setTimeout(() => {
                    // If we're still here, maybe suggest manual click
                    console.log("Deep link attempt finished.");
                }, 2000);
            } else {
                document.querySelector('h1').textContent = "BoxViewer Sharing";
                document.querySelector('p').textContent = "Use this service to share senseBoxes with other BoxViewer users.";
            }
        })();
    </script>
</body>
</html>
