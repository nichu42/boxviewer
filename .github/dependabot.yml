version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "android"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"
    groups:
      kotlin-toolchain:
        patterns:
          - "org.jetbrains.kotlin*"
          - "com.google.devtools.ksp"
          - "org.jetbrains.kotlinx*"
        update-types:
          - "minor"
          - "patch"
      androidx:
        patterns:
          - "androidx.*"
        update-types:
          - "minor"
          - "patch"
      compose-bom:
        patterns:
          - "androidx.compose:compose-bom"
        update-types:
          - "major"
          - "minor"
          - "patch"
      squareup:
        patterns:
          - "com.squareup.retrofit2*"
          - "com.squareup.okhttp3*"
          - "com.squareup.moshi*"
        update-types:
          - "minor"
          - "patch"
      google-plugins:
        patterns:
          - "com.android.application*"
          - "com.android.library*"
          - "com.google.android.libraries.mapsplatform*"
        update-types:
          - "minor"
          - "patch"
      testing:
        patterns:
          - "junit*"
          - "org.robolectric*"
          - "io.github.takahirom*"
        update-types:
          - "minor"
          - "patch"
      zxing:
        patterns:
          - "com.google.zxing*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "com.google.android.libraries.mapsplatform.secrets-gradle-plugin"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci(deps)"
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "build"
    commit-message:
      prefix: "chore(gradle)"
    allow:
      dependency-type: "all"
