name: Sync translations from POEditor

on:
  workflow_dispatch:
  schedule:
    # Run every Sunday at 02:00 UTC
    - cron: '0 2 * * 0'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Export translations from POEditor
        env:
          POEDITOR_API_TOKEN: ${{ secrets.POEDITOR_API_TOKEN }}
          POEDITOR_PROJECT_ID: ${{ vars.POEDITOR_PROJECT_ID || '835836' }}
        run: |
          set -euo pipefail
          LANGUAGES=("de")
          for lang in "${LANGUAGES[@]}"; do
            echo "Exporting $lang..."
            response=$(curl -s -X POST https://api.poeditor.com/v2/projects/export \
              -d api_token="$POEDITOR_API_TOKEN" \
              -d id="$POEDITOR_PROJECT_ID" \
              -d language="$lang" \
              -d type="android_strings" \
              -d options='[{"unquoted":1}]')
            url=$(echo "$response" | jq -r '.result.url')
            if [ "$url" = "null" ] || [ -z "$url" ]; then
              echo "Failed to get export URL for $lang: $response"
              exit 1
            fi
            target_dir="app/src/main/res/values-${lang}/"
            mkdir -p "$target_dir"
            curl -s -L "$url" -o "${target_dir}strings.xml"
            echo "Downloaded $lang to ${target_dir}strings.xml"
          done

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/src/main/res/
          if git diff --cached --quiet; then
            echo "No translation changes to commit."
          else
            git commit -m "chore: sync translations from POEditor"
            git push
          fi
