name: Deploy to bunny.net

on:
  push:
    branches:
      - main
    paths:
      - 'web/**'
  workflow_dispatch:

concurrency:
  group: bunny-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Sync web assets to Bunny Storage
        env:
          BUNNY_STORAGE_HOST: ${{ secrets.BUNNY_STORAGE_HOST }}
          BUNNY_STORAGE_PASSWORD: ${{ secrets.BUNNY_STORAGE_PASSWORD }}
          BUNNY_STORAGE_ZONE: ${{ secrets.BUNNY_STORAGE_ZONE }}
        run: |
          find ./web -type f | while read -r file; do
            target="${file#./web/}"
            echo "Uploading $file -> $target"
            curl -fsS -X PUT "https://${BUNNY_STORAGE_HOST}/${BUNNY_STORAGE_ZONE}/${target}" \
              -H "AccessKey: ${BUNNY_STORAGE_PASSWORD}" \
              --data-binary "@$file"
          done

      - name: Purge pull zone cache
        continue-on-error: true
        env:
          BUNNY_API_KEY: ${{ secrets.BUNNY_API_KEY }}
          BUNNY_PULL_ZONE_ID: ${{ secrets.BUNNY_PULL_ZONE_ID }}
        run: |
          if [ -z "$BUNNY_API_KEY" ] || [ -z "$BUNNY_PULL_ZONE_ID" ]; then
            echo "BUNNY_API_KEY or BUNNY_PULL_ZONE_ID not set, skipping cache purge"
            exit 0
          fi
          curl -s -X POST "https://api.bunny.net/pullzone/${BUNNY_PULL_ZONE_ID}/purgeCache" \
            -H "AccessKey: ${BUNNY_API_KEY}"
